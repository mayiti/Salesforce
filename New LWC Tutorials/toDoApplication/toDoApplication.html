<template>
    <lightning-card title="To Do Application">
        <div class="slds-box slds-p-around_none slds-m-top_x-small slds-m-bottom_medium slds-m-horizontal_none">
            <lightning-layout multiple-rows>
                <lightning-layout-item size="4" padding="around-small">
                    <lightning-card title="Add New Task">
                        <div class="slds-var-p-around_small">
                            <lightning-input label="Enter Task" placeholder="Enter task details" required="true"
                                message-when-value-missing="Kindly Enter Task Name" onchange={changeHandler}
                                name="taskname" value={taskname} class="taskname"></lightning-input>
                            <lightning-input type="date" label="Set End Date"
                                field-level-help="Default End Date is Today's Date" onchange={changeHandler}
                                name="taskdate" value={taskdate}></lightning-input>
                            <div class="slds-var-p-around_small">
                                <lightning-button label="Reset" variant="brand" onclick={resetHandler}
                                    class="slds-var-p-around_small"></lightning-button>
                                <lightning-button label="Add Task" variant="brand" onclick={addTaskHandler}
                                    class="slds-var-p-around_small"></lightning-button>
                            </div>
                        </div>
                    </lightning-card>
                </lightning-layout-item>
                <lightning-layout-item size="4" padding="around-small">
                    <lightning-card title="To Do List">
                        <div class="slds-var-p-around_small">
                            <template for:each={incompletetask} for:item="currtask" for:index="index">
                                <div key={currtask.taskId} class="slds-box slds-theme_shade incompletebg"
                                    draggable="true" ondragstart={dragStartHandler} data-item={currtask.taskId}>
                                    <div class="slds-grid slds-wrap">
                                        <div class="slds-col slds-size_8-of-12">
                                            <p class="formattaskname">{currtask.taskname}</p>
                                            <p>
                                                <lightning-formatted-date-time value={currtask.taskdate} year="2-digit"
                                                    month="short" day="2-digit"
                                                    weekday="long"></lightning-formatted-date-time>
                                            </p>
                                        </div>
                                        <div class="slds-col slds-size_4-of-12">
                                            <lightning-button-icon icon-name="utility:delete" alternative-text="Delete"
                                                class="slds-m-left_xx-small" title="Delete" onclick={removalHandler}
                                                name={currtask.taskId}></lightning-button-icon>
                                            <lightning-button-icon icon-name="utility:check" alternative-text="check"
                                                class="slds-m-left_xx-small" title="Delete"
                                                onclick={completetaskHandler}
                                                name={currtask.taskId}></lightning-button-icon>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </lightning-card>
                </lightning-layout-item>
                <lightning-layout-item size="4" padding="around-small">
                    <lightning-card title="Completed Task">
                        <div class="slds-var-p-around_small">
                            <template for:each={completedtask} for:item="currtask" for:index="index">
                                <div key={currtask.taskId} class="slds-box slds-theme_shade completedbg"
                                    ondragover={allowDrop} ondrop={dropElementHandler} data-item={currtask.taskId}>
                                    <div class="slds-grid slds-wrap">
                                        <div class="slds-col slds-size_8-of-12">
                                            <p class="formattaskname">{currtask.taskname}</p>
                                            <p><lightning-formatted-date-time value={currtask.taskdate} year="2-digit"
                                                    month="short" day="2-digit"
                                                    weekday="long"></lightning-formatted-date-time></p>
                                        </div>
                                        <div class="slds-col slds-size_4-of-12">
                                            <lightning-button-icon icon-name="utility:delete" alternative-text="Delete"
                                                class="slds-m-left_xx-small" title="Delete" onclick={removalHandler}
                                                name={currtask.taskId}></lightning-button-icon>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </lightning-card>
                </lightning-layout-item>
            </lightning-layout>
        </div>
    </lightning-card>
</template>
